<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise Forge Works | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .active-tab { border-bottom: 2px solid #3b82f6; color: white; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-300 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 glass p-6 rounded-2xl">
            <div>
                <h1 class="text-2xl font-bold text-white">Twin Creation <span class="gradient-text">Admin</span></h1>
                <p class="text-xs text-slate-500 uppercase tracking-widest mt-1">v2.1 - Master Control</p>
            </div>
            <input type="password" id="ghToken" placeholder="GitHub Token" class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm outline-none focus:border-blue-500">
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="glass p-6 rounded-2xl">
                    <div class="flex gap-4 mb-6 border-b border-slate-800">
                        <button onclick="switchTab('privacy')" id="tab-privacy" class="pb-2 text-sm font-bold active-tab">PRIVACY</button>
                        <button onclick="switchTab('terms')" id="tab-terms" class="pb-2 text-sm font-bold text-slate-500">TERMS</button>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">APP NAME</label>
                                <input type="text" id="appName" value="Luma Notes" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1">DEV EMAIL</label>
                                <input type="text" id="devEmail" value="contact@twincreation.dev" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 outline-none">
                            </div>
                        </div>

                        <div id="permission-section">
                            <label class="block text-xs font-bold text-slate-500 mb-2">APP PERMISSIONS</label>
                            <div class="grid grid-cols-2 gap-2 text-sm">
                                <label class="flex items-center gap-2 bg-slate-900/50 p-2 rounded"><input type="checkbox" class="feature-toggle" value="Camera"> Camera</label>
                                <label class="flex items-center gap-2 bg-slate-900/50 p-2 rounded"><input type="checkbox" class="feature-toggle" value="Storage"> Storage</label>
                                <label class="flex items-center gap-2 bg-slate-900/50 p-2 rounded"><input type="checkbox" class="feature-toggle" value="Ads" checked> AdMob</label>
                                <label class="flex items-center gap-2 bg-slate-900/50 p-2 rounded"><input type="checkbox" class="feature-toggle" value="Analytics" checked> Firebase</label>
                            </div>
                        </div>

                        <button onclick="generateContent()" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-blue-400 transition">Update Preview</button>
                        <button onclick="pushToGitHub()" id="saveBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-500 transition shadow-lg shadow-blue-900/40">Push to GitHub</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="bg-white rounded-2xl h-[700px] flex flex-col overflow-hidden shadow-2xl">
                    <div id="previewArea" class="p-10 overflow-y-auto text-slate-800 prose prose-blue max-w-none"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'privacy';

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-privacy').className = mode === 'privacy' ? 'pb-2 text-sm font-bold active-tab' : 'pb-2 text-sm font-bold text-slate-500';
            document.getElementById('tab-terms').className = mode === 'terms' ? 'pb-2 text-sm font-bold active-tab' : 'pb-2 text-sm font-bold text-slate-500';
            generateContent();
        }

        function generateContent() {
            const app = document.getElementById('appName').value;
            const email = document.getElementById('devEmail').value;
            const features = Array.from(document.querySelectorAll('.feature-toggle:checked')).map(el => el.value);
            let html = "";

            if(currentMode === 'privacy') {
                html = `<h1>Privacy Policy</h1><p>Last updated: 2026</p><p>Twin Creation built <strong>${app}</strong> as a Commercial app. We collect minimal data to provide a better service.</p>
                        <h3>Data Usage</h3><ul>${features.map(f => `<li><strong>${f}:</strong> Used for app features.</li>`).join('')}</ul>
                        <h3>Contact</h3><p>${email}</p>`;
            } else {
                html = `<h1>Terms of Service</h1><p>By using <strong>${app}</strong>, you agree to these terms.</p>
                        <h3>Usage Rules</h3><p>You may not use this app for any illegal activities. Twin Creation provides this "as is" without warranty.</p>
                        <h3>Termination</h3><p>We reserve the right to stop service at any time.</p>
                        <h3>Contact</h3><p>${email}</p>`;
            }
            document.getElementById('previewArea').innerHTML = html;
        }

        async function pushToGitHub() {
            const token = document.getElementById('ghToken').value;
            const appFolder = document.getElementById('appName').value.toLowerCase().replace(" ", "-");
            const fileName = currentMode === 'privacy' ? 'privacy.html' : 'terms.html';
            const btn = document.getElementById('saveBtn');
            
            // Clean HTML for the final file
            const finalHTML = `<!DOCTYPE html><html><head><title>${currentMode} - ${appFolder}</title><link href="https://cdn.tailwindcss.com" rel="stylesheet"></head><body class="p-10 max-w-3xl mx-auto font-sans">${document.getElementById('previewArea').innerHTML}</body></html>`;

            if(!token) return alert("❌ Enter Token!");
            btn.innerText = "⏳ Pushing...";
            
            const owner = "twincreation";
            const repo = "luma-notes"; // Target Public Repo
            const path = fileName;

            try {
                let sha = "";
                const getRes = await fetch(\`https://api.github.com/repos/\${owner}/\${repo}/contents/\${path}\`, {
                    headers: { "Authorization": \`token \${token}\` }
                });
                if(getRes.ok) { const data = await getRes.json(); sha = data.sha; }

                const pushRes = await fetch(\`https://api.github.com/repos/\${owner}/\${repo}/contents/\${path}\`, {
                    method: "PUT",
                    headers: { "Authorization": \`token \${token}\`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: \`Admin Update: \${fileName}\`,
                        content: btoa(unescape(encodeURIComponent(finalHTML))),
                        sha: sha
                    })
                });

                if(pushRes.ok) alert("✅ Success!");
                else alert("❌ Error: " + (await pushRes.json()).message);
            } catch (e) { alert("❌ Failed: " + e.message); }
            btn.innerText = "Push to GitHub";
        }

        generateContent();
    </script>
</body>
</html>
